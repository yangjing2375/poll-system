<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>创建投票 - 在线投票系统</title>
    <link rel="stylesheet" href="../static/css/style.css">
    <style>
        .option-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .option-item input {
            flex: 1;
        }
        .option-item button {
            width: auto !important;
            padding: 6px 12px !important;
            margin-top: 0 !important;
            font-size: 13px !important;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .checkbox-label input[type="checkbox"] {
            width: auto !important;
            margin: 0 !important;
        }
        textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            resize: vertical;
            font-family: inherit;
        }
        textarea:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
            background: white;
            cursor: pointer;
        }
        select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">
                <h1>🗳️ 在线投票系统</h1>
            </div>
            <nav>
                <a href="index.html" class="nav-link">首页</a>
                <a href="create_poll.html" class="nav-link active">创建投票</a>
                <span id="user-info" class="nav-link"></span>
                <button id="logout-btn" class="btn btn-secondary">退出登录</button>
            </nav>
        </header>

        <main>
            <div class="card">
                <h2>创建新投票</h2>
                
                <form id="create-poll-form" class="form-group">
                    <div class="form-item">
                        <label for="title">投票标题 *</label>
                        <input type="text" id="title" name="title" placeholder="请输入投票标题" required>
                    </div>
                    
                    <div class="form-item">
                        <label for="description">投票描述</label>
                        <textarea id="description" name="description" placeholder="请输入投票描述（可选）" rows="4"></textarea>
                    </div>

                    <div class="form-item">
                        <label for="topic">投票专题 *</label>
                        <select id="topic" name="topic" required>
                            <option value="">请选择投票专题</option>
                            <option value="家庭&情感">💗 家庭&情感</option>
                            <option value="美食专题">🍰 美食专题</option>
                            <option value="校园专题">🎓 校园专题</option>
                            <option value="职场专题">💼 职场专题</option>
                            <option value="影视专题">🎬 影视专题</option>
                            <option value="运动&出行">🏃 运动&出行</option>
                            <option value="娱乐专题">🎮 娱乐专题</option>
                            <option value="旅游专题">✈️ 旅游专题</option>
                            <option value="汽车专题">🚗 汽车专题</option>
                            <option value="游戏专题">🎲 游戏专题</option>
                        </select>
                    </div>

                    <div class="form-item">
                        <label>投票选项 *</label>
                        <div id="options-container">
                            <div class="option-item">
                                <input type="text" class="option-input" placeholder="选项 1" required>
                                <button type="button" class="btn btn-danger remove-option">删除</button>
                            </div>
                            <div class="option-item">
                                <input type="text" class="option-input" placeholder="选项 2" required>
                                <button type="button" class="btn btn-danger remove-option">删除</button>
                            </div>
                        </div>
                        <button type="button" id="add-option-btn" class="btn btn-secondary" style="margin-top: 10px; width: 100%;">添加选项</button>
                    </div>

                    <div class="form-item">
                        <label class="checkbox-label">
                            <span>允许多选</span>
                            <input type="checkbox" id="is_multiple" name="is_multiple">
                        </label>
                    </div>

                    <div class="form-item" id="max-options-container" style="display: none;">
                        <label for="max_options">最多可选数量</label>
                        <input type="number" id="max_options" name="max_options" value="2" min="2">
                    </div>

                    <div class="form-item">
                        <label for="end_time">截止时间（可选）</label>
                        <input type="datetime-local" id="end_time" name="end_time">
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%;">创建投票</button>
                </form>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 在线投票系统</p>
        </footer>
    </div>

    <script src="../static/js/create_poll.js"></script>
</body>
</html>
